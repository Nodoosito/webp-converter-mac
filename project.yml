name: Orlo
options:
  bundleIdPrefix: com.orlo
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Orlo:
    type: application
    platform: macOS
    sources:
      - path: Sources/WebPConverterMac
        type: group
        excludes:
          - "**/.DS_Store"
      - path: Sources/WebPConverterMac/Resources
        type: group
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orlo.WebPConverter
        INFOPLIST_FILE: Orlo/Info.plist
        CODE_SIGN_ENTITLEMENTS: Orlo/Orlo.entitlements
        PRODUCT_NAME: Orlo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: Orlo/Info.plist
      properties:
        CFBundleName: Orlo
        CFBundleDisplayName: Orlo
        CFBundleIdentifier: com.orlo.WebPConverter
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Orlo
        LSMinimumSystemVersion: "13.0"
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.photography
        NSHumanReadableCopyright: "Copyright © 2024 Orlo. All rights reserved."
    entitlements:
      path: Orlo/Orlo.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true